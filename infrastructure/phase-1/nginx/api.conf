# Environment-aware API routing template for Phase 1.10

upstream onehr_api_dev {
  server 127.0.0.1:3101;
}

upstream onehr_api_staging {
  server 127.0.0.1:3201;
}

upstream onehr_api_prod {
  server 127.0.0.1:3301;
}

server {
  listen 443 ssl http2;
  server_name api-dev.onehr.example.com;

  include /etc/nginx/snippets/onehr-security-headers.conf;

  location / {
    proxy_pass http://onehr_api_dev;
    include /etc/nginx/proxy_params;
  }
}

server {
  listen 443 ssl http2;
  server_name api-staging.onehr.example.com;

  include /etc/nginx/snippets/onehr-security-headers.conf;

  location / {
    proxy_pass http://onehr_api_staging;
    include /etc/nginx/proxy_params;
  }
}

server {
  listen 443 ssl http2;
  server_name api.onehr.example.com;

  include /etc/nginx/snippets/onehr-security-headers.conf;

  location / {
    proxy_pass http://onehr_api_prod;
    include /etc/nginx/proxy_params;
  }
}
